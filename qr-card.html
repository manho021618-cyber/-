<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>백두농기 안내카드 (인쇄용)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  @page{size:A5 landscape;margin:0}
  body{font-family:'Noto Sans KR',sans-serif;background:#fff;color:#212121;display:flex;justify-content:center;align-items:center;min-height:100vh}
  .card{width:210mm;height:148mm;border:2px solid #1B5E20;border-radius:16px;padding:14mm 16mm;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:8mm;background:linear-gradient(135deg,#1B5E20,#2E7D32);border-radius:14px 14px 0 0}
  .header{text-align:center;margin-top:10mm}
  .header h1{font-size:22px;font-weight:900;color:#1B5E20;letter-spacing:-0.5px}
  .header p{font-size:12px;color:#616161;margin-top:2mm}
  .qr-grid{display:grid;grid-template-columns:1fr 1fr;gap:8mm 12mm;margin:6mm 0}
  .qr-item{display:flex;align-items:center;gap:5mm;background:#F5F5F0;border-radius:10px;padding:4mm 5mm}
  .qr-item img{width:28mm;height:28mm;border-radius:6px;border:1px solid #E0E0E0;background:#fff;padding:1mm}
  .qr-info{flex:1}
  .qr-info .label{font-size:13px;font-weight:700;color:#1B5E20;margin-bottom:1mm}
  .qr-info .desc{font-size:10px;color:#616161;line-height:1.5}
  .qr-info .icon{font-size:16px;margin-right:1mm}
  .footer{text-align:center;border-top:1px solid #E0E0E0;padding-top:3mm}
  .footer p{font-size:10px;color:#888}
  .footer .as{font-size:12px;font-weight:700;color:#1B5E20}
  @media print{body{min-height:auto} .card{border:none;border-radius:0} .card::before{border-radius:0}}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>🌿 백두농기 미니 관리기 (4행정 198cc)</h1>
    <p>아래 QR코드를 핸드폰 카메라로 비추시면 바로 접속됩니다</p>
  </div>

  <div class="qr-grid">
    <!-- 1. 사용설명서 -->
    <div class="qr-item">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://manho021618-cyber.github.io/-/" alt="QR 설명서">
      <div class="qr-info">
        <div class="label"><span class="icon">📖</span> 사용설명서</div>
        <div class="desc">제품 조립, 시동, 유지보수<br>방법을 확인하세요</div>
      </div>
    </div>

    <!-- 2. 텃밭 달력 -->
    <div class="qr-item">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://manho021618-cyber.github.io/-/garden.html" alt="QR 텃밭달력">
      <div class="qr-info">
        <div class="label"><span class="icon">🌱</span> 텃밭 재배 달력</div>
        <div class="desc">월별 작물 파종·수확<br>시기를 확인하세요</div>
      </div>
    </div>

    <!-- 3. 초기 시동영상 -->
    <div class="qr-item">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://www.youtube.com/watch?v=5Jo2-Y1QgVI" alt="QR 시동영상">
      <div class="qr-info">
        <div class="label"><span class="icon">🎬</span> 초기 시동 영상</div>
        <div class="desc">처음 시동 거는 방법을<br>영상으로 확인하세요</div>
      </div>
    </div>

    <!-- 4. 초기 조립영상 -->
    <div class="qr-item">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://www.youtube.com/watch?v=z4h5VyxXMPE" alt="QR 조립영상">
      <div class="qr-info">
        <div class="label"><span class="icon">🔧</span> 초기 조립 영상</div>
        <div class="desc">개봉 후 조립 방법을<br>영상으로 확인하세요</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <p class="as">A/S 문의: 010-3019-8259</p>
    <p>© 백두농기 — 본 QR코드는 영구적으로 유효합니다</p>
  </div>
</div>
</body>
</html>
